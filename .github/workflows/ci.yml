name: CI

# Se ejecuta sobre Pull Requests y sobre push a las ramas de integración,
# más un disparador manual para reintentos ad hoc. No hay ningún job de
# despliegue en este workflow.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

# Cancela ejecuciones anteriores del mismo PR/rama cuando llega un push
# nuevo, para no gastar minutos de CI en resultados que ya quedaron
# obsoletos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  # Debe coincidir con "packageManager" en package.json. actions/setup-node
  # no fija versión de npm por sí solo — usa la que venga empaquetada con el
  # Node.js resuelto, que avanza con el tiempo. Sin este pin, `npm ci` puede
  # fallar más adelante con "Missing: ... from lock file" apenas una versión
  # de npm más nueva resuelva una dependencia opcional transitiva distinta a
  # como quedó grabada en package-lock.json (pasó exactamente esto: faltaban
  # @emnapi/core@1.11.2 y @emnapi/runtime@1.11.2 — dependencias opcionales de
  # una native binding de Linux que npm 11.6.2 nunca resolvió en Windows,
  # pero un npm más nuevo en Linux sí).
  NPM_VERSION: "11.16.0"

jobs:
  # type-check + lint + Vitest: rápido, no necesita Docker/Supabase. El job
  # de e2e depende de este para no gastar tiempo levantando Playwright si
  # ya hay un error de tipos o de lint.
  checks:
    name: Type-check, lint y pruebas unitarias
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Caché del filesystem cache de Turborepo (.turbo/, ver .gitignore).
      # Turbo decide hit/miss por hash de contenido real, así que una clave
      # amplia con restore-keys como fallback es suficiente y segura: en el
      # peor caso (sin match) simplemente no acelera nada, nunca sirve un
      # resultado obsoleto.
      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      - name: Type-check (tsc --noEmit en todos los paquetes)
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Pruebas unitarias (Vitest, con cobertura)
        run: npm run test -- -- --coverage

      - name: Publicar cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: |
            apps/web/coverage
            packages/*/coverage
          retention-days: 7
          if-no-files-found: ignore

  # E2E con Playwright, contra un stack de Supabase LOCAL y efímero
  # (levantado y sembrado dentro del propio runner vía Supabase CLI +
  # Docker, ya preinstalado en los runners ubuntu-latest de GitHub). Así el
  # login real de e2e/tests/auth.spec.ts tiene un usuario sembrado con el
  # que autenticarse sin necesitar ningún secreto: las claves que arroja
  # `supabase status` para este stack son las mismas para cualquier
  # instancia local de Supabase en cualquier máquina, y el stack completo
  # se destruye con el runner al terminar el job.
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # Solo Chromium en CI (mantiene el job rápido); Firefox y WebKit
      # quedan disponibles para correr localmente vía `npm run test:e2e`.
      - name: Restaurar caché de navegadores de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar navegador de Playwright (Chromium)
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Levantar Supabase local
        run: supabase start

      - name: Aplicar migraciones y datos sembrados (supabase/seed.sql)
        run: supabase db reset

      # Credenciales del stack local efímero de este job, no secretos del
      # proyecto: se leen dinámicamente en vez de fijarlas en el workflow.
      - name: Leer credenciales del Supabase local
        id: supabase
        run: |
          STATUS=$(supabase status -o json)
          echo "api_url=$(echo "$STATUS" | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      # seed.sql no crea usuarios de auth: insertar una fila cruda en
      # auth.users requeriría replicar el hash bcrypt y las filas de
      # auth.identities a mano. El Admin API de GoTrue ya hace eso de forma
      # soportada, con la Service Role Key que arrojó el paso anterior. El
      # trigger handle_new_user crea el `profiles` correspondiente igual que
      # con cualquier alta real. Credenciales fijas y no-secretas: este
      # usuario vive solo en el stack local efímero de este job y se destruye
      # con él — no hace falta un GitHub Secret para esto.
      - name: Crear usuario de prueba para el E2E
        run: |
          curl -sf -X POST "${{ steps.supabase.outputs.api_url }}/auth/v1/admin/users" \
            -H "apikey: ${{ steps.supabase.outputs.service_role_key }}" \
            -H "Authorization: Bearer ${{ steps.supabase.outputs.service_role_key }}" \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-ci@readhub.test","password":"E2eCiPlaywright!2026","email_confirm":true}'

      - name: Ejecutar pruebas E2E
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          E2E_USER_EMAIL: e2e-ci@readhub.test
          E2E_USER_PASSWORD: "E2eCiPlaywright!2026"
        run: npx playwright test --project=chromium

      # playwright.config.ts ya agrega el reporter "github" cuando CI=true
      # (variable que Actions define automáticamente), así que los fallos
      # también quedan anotados directamente sobre el diff del PR sin nada
      # adicional aquí. Esto solo sube el reporte HTML + screenshots/video
      # como artefacto descargable, y solo cuando algo falló.
      - name: Publicar reporte de Playwright (solo si falló)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/e2e/playwright-report
            apps/web/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Detener Supabase local
        if: always()
        run: supabase stop

  # ───────────────────────────────────────────────────────────────────────
  # PERFORMANCE — corre después de que checks (type-check/lint/Vitest) y
  # e2e (Playwright) terminaron en verde. Genera el build de producción,
  # audita tamaño de bundle y Core Web Vitals/Lighthouse, y actúa como gate:
  # si algún umbral no se cumple, este job falla y por lo tanto `deploy`
  # (que depende de él vía `needs`) nunca se ejecuta.
  #
  # Corre también en Pull Requests (mismos triggers que checks/e2e) para dar
  # feedback de regresiones de performance antes del merge, sin desplegar
  # nada — el job `deploy` es el único que publica a Vercel, y solo en push
  # a main/master.
  #
  # Nota: en PRs desde forks, los Secrets de este repo no están disponibles
  # (limitación estándar de GitHub Actions) — este job fallará en esos PRs
  # por falta de credenciales de Vercel, no por una regresión real. No aplica
  # a PRs desde ramas del propio repo.
  # ───────────────────────────────────────────────────────────────────────
  performance:
    name: Performance (build, bundle, Lighthouse)
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # Descarga las variables de entorno reales del proyecto de Vercel
      # (Production) — evita duplicar cada NEXT_PUBLIC_* como GitHub Secret
      # por separado y mantiene el build de este job alineado con el que
      # Vercel usaría. Solo lee variables, no construye ni despliega nada.
      # Corre desde la raíz del repo (no working-directory: apps/web) porque
      # el proyecto de Vercel tiene Root Directory = apps/web configurado en
      # su dashboard — aplicarlo también acá vía cd duplicaría la ruta
      # (apps/web/apps/web) y el CLI la rechaza.
      - name: Descargar variables de entorno de Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      # `vercel pull` escribe las variables en `.vercel/.env.production.local`
      # (raíz del repo), que Next.js no lee automáticamente (solo mira
      # archivos `.env*` en la raíz del proyecto Next, apps/web). Este job
      # usa `next build` directo (no `vercel build`, a diferencia del job
      # `deploy`) para que `size-limit` y `next start` sigan operando sobre
      # `.next` estándar — por eso hace falta copiar el archivo.
      - name: Exponer variables de Vercel a next build
        run: cp .vercel/.env.production.local apps/web/.env.production.local

      # Production Build real (next build), el mismo que se auditará y el
      # que — si pasa los gates de abajo — se terminará desplegando.
      - name: Generar Production Build (next build)
        working-directory: apps/web
        run: npm run build

      # Analiza el tamaño del JS/CSS de cliente ya generado en .next/static
      # y falla (exit ≠ 0) si supera el presupuesto definido en el campo
      # "size-limit" de apps/web/package.json. Un fallo acá detiene el job.
      - name: Analizar tamaño del bundle (size-limit)
        working-directory: apps/web
        # Se invoca el binario directo (no via `npm run`) para que el
        # banner que imprime `npm run` no termine mezclado con el JSON
        # redirigido al archivo del reporte.
        run: npx size-limit --json > bundle-size-report.json

      # Sirve el build recién generado (next start) y corre Lighthouse
      # sobre las páginas públicas que no requieren sesión (/login,
      # /register — el resto de las rutas del dashboard exige un usuario
      # autenticado real, fuera del alcance de esta auditoría automática).
      # lhci autorun falla (exit ≠ 0) si algún umbral de
      # apps/web/lighthouserc.json no se cumple.
      - name: Auditoría de Core Web Vitals / Lighthouse
        working-directory: apps/web
        run: npm run audit:lighthouse

      # Vuelca bundle-size-report.json + .lighthouseci/manifest.json como
      # tabla Markdown en la pestaña "Summary" del job — para ver los
      # números clave (tamaño de bundle, performance score, LCP/CLS/TBT) sin
      # descargar el artefacto. Corre con `always()` para que un fallo de
      # los gates anteriores también quede diagnosticable acá.
      - name: Resumen de performance en el Summary de GitHub Actions
        if: always()
        working-directory: apps/web
        run: node scripts/print-performance-summary.mjs

      # Reporte consolidado como artefacto descargable, se sube siempre
      # (incluso si algún gate anterior falló) para poder inspeccionar por
      # qué — ver la sección "Cómo interpretar los reportes" en la
      # explicación de este cambio.
      - name: Publicar reporte de performance como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            apps/web/bundle-size-report.json
            apps/web/.lighthouseci
          retention-days: 30
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────
  # DEPLOY — únicamente en push a main/master (nunca en Pull Requests), y
  # únicamente si checks, e2e Y performance terminaron en verde (`needs`).
  # Usa el flujo oficial de Vercel CLI para CI/CD: vercel pull → vercel
  # build --prod → vercel deploy --prebuilt --prod, que construye una sola
  # vez y despliega exactamente esos artefactos (sin que Vercel vuelva a
  # buildear del lado suyo).
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy a Vercel (Production)
    runs-on: ubuntu-latest
    needs: [checks, e2e, performance]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Los 3 pasos de Vercel corren desde la raíz del repo (sin
      # working-directory: apps/web) por la misma razón que en el job
      # `performance`: Root Directory = apps/web ya está configurado en el
      # dashboard del proyecto, así que el CLI lo resuelve solo. Además,
      # `vercel deploy --prebuilt` valida la existencia de cada dependencia
      # de `node_modules` con una ruta relativa literal al CWD — como npm
      # workspaces hoistea paquetes como @swc/helpers a la raíz del
      # monorepo, ese chequeo fallaba si el CWD era apps/web/.
      - name: Descargar configuración y variables de entorno de Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Construir artefactos para Vercel (vercel build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Desplegar artefactos pre-construidos a producción
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"
